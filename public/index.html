<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Chat Corporativo</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- TOPO -->

<div class="top-bar">

<div class="top-left">
<img src="logo.png" class="logo-top">
<h2>Chat Corporativo</h2>
</div>

<div class="top-center">
<span id="usuarioNome"></span>
</div>

<div class="top-right">
<button class="btn-voltar" onclick="voltar()">← Voltar</button>
</div>

</div>

<!-- STATUS -->

<div id="status-bar">
Servidor: Servidor Online | Usuários online: 1
</div>

<!-- CHAT -->

<div class="chat-card">

<div id="mensagens"></div>

<div class="envio">

<input id="texto" placeholder="Digite mensagem">

<button onclick="enviar()">Enviar</button>

</div>

</div>

</div>

<script src="script.js"></script>

<script>

/* MOSTRAR USUARIO */

document.getElementById("usuarioNome").innerText =
"Usuário: " + localStorage.getItem("usuario");


/* BOTAO VOLTAR */

function voltar(){

window.location.href="home.html";

}

function voltar(){
window.location.href = "home.html";
}

</script>

</body>
</html>
